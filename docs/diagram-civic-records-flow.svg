<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760" role="img" aria-labelledby="title desc">
  <title id="title">Civic records flow</title>
  <desc id="desc">Citizen, permits, tax, and expenditure workflows.</desc>
  <defs><style>.bg{fill:#fff}.title{font:700 18px Arial,Helvetica,sans-serif;fill:#222;letter-spacing:1px}.box{fill:#fff;stroke:#222;stroke-width:2}.text{font:14px Arial,Helvetica,sans-serif;fill:#222}.small{font:12px Arial,Helvetica,sans-serif;fill:#333}.line{fill:none;stroke:#222;stroke-width:2;marker-end:url(#a)}</style><marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#222"/></marker></defs>
  <rect class="bg" width="900" height="760"/><text class="title" x="450" y="48" text-anchor="middle">CIVIC RECORDS FLOW</text>
  <rect class="box" x="330" y="90" width="240" height="64"/><text class="text" x="450" y="118" text-anchor="middle">Authenticated user</text><text class="small" x="450" y="139" text-anchor="middle">auth.currentUser required</text>
  <rect class="box" x="75" y="235" width="170" height="64"/><text class="text" x="160" y="263" text-anchor="middle">Add citizen</text><text class="small" x="160" y="284" text-anchor="middle">registerCitizen()</text>
  <rect class="box" x="265" y="235" width="170" height="64"/><text class="text" x="350" y="263" text-anchor="middle">Issue permit</text><text class="small" x="350" y="284" text-anchor="middle">handleIssueDocument()</text>
  <rect class="box" x="455" y="235" width="170" height="64"/><text class="text" x="540" y="263" text-anchor="middle">Record spend</text><text class="small" x="540" y="284" text-anchor="middle">recordExpenditure()</text>
  <rect class="box" x="645" y="235" width="170" height="64"/><text class="text" x="730" y="263" text-anchor="middle">Tax data</text><text class="small" x="730" y="284" text-anchor="middle">fetchTaxRevenue()</text>
  <rect class="box" x="75" y="390" width="170" height="64"/><text class="text" x="160" y="418" text-anchor="middle">New Citizen</text><text class="small" x="160" y="439" text-anchor="middle">Firestore collection</text>
  <rect class="box" x="265" y="390" width="170" height="64"/><text class="text" x="350" y="418" text-anchor="middle">Permits</text><text class="small" x="350" y="439" text-anchor="middle">Firestore collection</text>
  <rect class="box" x="455" y="390" width="170" height="64"/><text class="text" x="540" y="418" text-anchor="middle">Expenditure</text><text class="small" x="540" y="439" text-anchor="middle">Firestore collection</text>
  <rect class="box" x="645" y="390" width="170" height="64"/><text class="text" x="730" y="418" text-anchor="middle">TaxRevenue</text><text class="small" x="730" y="439" text-anchor="middle">Firestore collection</text>
  <rect class="box" x="180" y="575" width="210" height="64"/><text class="text" x="285" y="603" text-anchor="middle">List/table pages</text><text class="small" x="285" y="624" text-anchor="middle">citizens, permits, spend</text>
  <rect class="box" x="510" y="575" width="210" height="64"/><text class="text" x="615" y="603" text-anchor="middle">Dashboard metrics</text><text class="small" x="615" y="624" text-anchor="middle">cards, charts, tables</text>
  <path class="line" d="M450 154 L160 235"/><path class="line" d="M450 154 L350 235"/><path class="line" d="M450 154 L540 235"/><path class="line" d="M450 154 L730 235"/><path class="line" d="M160 299 L160 390"/><path class="line" d="M350 299 L350 390"/><path class="line" d="M540 299 L540 390"/><path class="line" d="M730 299 L730 390"/><path class="line" d="M160 454 L285 575"/><path class="line" d="M350 454 L285 575"/><path class="line" d="M540 454 L615 575"/><path class="line" d="M730 454 L615 575"/>
</svg>
