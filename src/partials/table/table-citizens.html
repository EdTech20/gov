<div class="w-full overflow-x-auto">
  <table class="min-w-full">
    <!-- table header -->
    <thead>
      <tr class="border-y border-gray-100 dark:border-gray-800">
        <th class="py-3 pl-2 text-left">
          <p class="text-theme-xs font-medium text-gray-500 dark:text-gray-400">Citizen Name</p>
        </th>
        <th class="py-3 text-left">
          <p class="text-theme-xs font-medium text-gray-500 dark:text-gray-400">NIN</p>
        </th>
        <th class="py-3 text-left">
          <p class="text-theme-xs font-medium text-gray-500 dark:text-gray-400">State / LGA</p>
        </th>
        <th class="py-3 text-left">
          <p class="text-theme-xs font-medium text-gray-500 dark:text-gray-400">Reg. Date</p>
        </th>
        <th class="py-3 text-left">
          <p class="text-theme-xs font-medium text-gray-500 dark:text-gray-400">Status</p>
        </th>
        <th class="py-3 pr-2 text-right">
          <p class="text-theme-xs font-medium text-gray-500 dark:text-gray-400">Action</p>
        </th>
      </tr>
    </thead>

    <!-- table body -->
    <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
      <template x-for="citizen in filteredCitizens" :key="citizen.id">
        <tr>
          <td class="py-4 pl-2">
            <div class="flex items-center gap-3">
              <div class="flex h-10 w-10 items-center justify-center rounded-full bg-blue-100 text-blue-600 dark:bg-blue-500/10 dark:text-blue-400 font-semibold text-sm" x-text="citizen.name.charAt(0).toUpperCase()">
              </div>
              <div>
                <p class="text-theme-sm font-medium text-gray-800 dark:text-white/90" x-text="citizen.name"></p>
                <span class="text-theme-xs text-gray-500 dark:text-gray-400"><span x-text="citizen.gender"></span>, <span x-text="citizen.age"></span></span>
              </div>
            </div>
          </td>
          <td class="py-4">
            <p class="text-theme-sm text-gray-500 dark:text-gray-400" x-text="citizen.nin"></p>
          </td>
          <td class="py-4">
            <p class="text-theme-sm text-gray-800 dark:text-white/90" x-text="citizen.state"></p>
            <span class="text-theme-xs text-gray-500 dark:text-gray-400" x-text="citizen.lga"></span>
          </td>
          <td class="py-4">
            <p class="text-theme-sm text-gray-500 dark:text-gray-400" x-text="citizen.date"></p>
          </td>
          <td class="py-4">
            <span 
              class="inline-flex rounded-full px-2 py-0.5 text-theme-xs font-medium"
              :class="{
                'bg-success-50 text-success-600 dark:bg-success-500/15 dark:text-success-500': citizen.status === 'Verified',
                'bg-warning-50 text-warning-600 dark:bg-warning-500/15 dark:text-orange-400': citizen.status === 'Pending',
                'bg-error-50 text-error-600 dark:bg-error-500/15 dark:text-error-500': citizen.status === 'Flagged'
              }"
              x-text="citizen.status"
            ></span>
          </td>
          <td class="py-4 pr-2 text-right">
            <button class="text-gray-500 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-500">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </td>
        </tr>
      </template>
      <template x-if="citizens.length === 0">
        <tr>
          <td colspan="6" class="py-8 text-center text-gray-500 dark:text-gray-400">
            No citizens registered in your jurisdiction yet.
          </td>
        </tr>
      </template>
    </tbody>
  </table>
</div>
