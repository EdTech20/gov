<div
  class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] sm:p-6"
>
  <div class="flex justify-between">
    <div>
      <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90">
        Revenue by District
      </h3>
      <p class="mt-1 text-theme-sm text-gray-500 dark:text-gray-400">
        Monthly revenue collection per ward/district
      </p>
    </div>

    <div x-data="{openDropDown: false}" class="relative h-fit">
      <button
        @click="openDropDown = !openDropDown"
        :class="openDropDown ? 'text-gray-700 dark:text-white' : 'text-gray-400 hover:text-gray-700 dark:hover:text-white'"
      >
        <svg
          class="fill-current"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            fill-rule="evenodd"
            clip-rule="evenodd"
            d="M10.2441 6C10.2441 5.0335 11.0276 4.25 11.9941 4.25H12.0041C12.9706 4.25 13.7541 5.0335 13.7541 6C13.7541 6.9665 12.9706 7.75 12.0041 7.75H11.9941C11.0276 7.75 10.2441 6.9665 10.2441 6ZM10.2441 18C10.2441 17.0335 11.0276 16.25 11.9941 16.25H12.0041C12.9706 16.25 13.7541 17.0335 13.7541 18C13.7541 18.9665 12.9706 19.75 12.0041 19.75H11.9941C11.0276 19.75 10.2441 18.9665 10.2441 18ZM11.9941 10.25C11.0276 10.25 10.2441 11.0335 10.2441 12C10.2441 12.9665 11.0276 13.75 11.9941 13.75H12.0041C12.9706 13.75 13.7541 12.9665 13.7541 12C13.7541 11.0335 12.9706 10.25 12.0041 10.25H11.9941Z"
            fill=""
          />
        </svg>
      </button>
      <div
        x-show="openDropDown"
        @click.outside="openDropDown = false"
        class="absolute right-0 top-full z-40 w-40 space-y-1 rounded-2xl border border-gray-200 bg-white p-2 shadow-theme-lg dark:border-gray-800 dark:bg-gray-dark"
      >
        <button
          class="flex w-full rounded-lg px-3 py-2 text-left text-theme-xs font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300"
        >
          Export CSV
        </button>
        <button
          class="flex w-full rounded-lg px-3 py-2 text-left text-theme-xs font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300"
        >
          View Report
        </button>
      </div>
    </div>
  </div>

  <!-- Summary badges -->
  <div class="mt-5 grid grid-cols-2 gap-3">
    <div class="rounded-xl bg-blue-50 dark:bg-blue-500/10 p-4">
      <p class="text-theme-xs text-blue-500 dark:text-blue-400 font-medium">Collected</p>
      <p class="mt-1 text-xl font-bold text-blue-700 dark:text-blue-300">₦375K</p>
      <p class="text-theme-xs text-blue-400 dark:text-blue-500 mt-0.5">75% of target</p>
    </div>
    <div class="rounded-xl bg-orange-50 dark:bg-orange-500/10 p-4">
      <p class="text-theme-xs text-orange-500 dark:text-orange-400 font-medium">Outstanding</p>
      <p class="mt-1 text-xl font-bold text-orange-700 dark:text-orange-300">₦125K</p>
      <p class="text-theme-xs text-orange-400 dark:text-orange-500 mt-0.5">25% uncollected</p>
    </div>
  </div>

  <!-- District breakdown -->
  <div class="mt-6 space-y-4">

    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-brand-50 dark:bg-brand-500/10 text-brand-600 dark:text-brand-400">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div>
          <p class="text-theme-sm font-semibold text-gray-800 dark:text-white/90">Central District</p>
          <span class="block text-theme-xs text-gray-500 dark:text-gray-400">3,210 taxpayers</span>
        </div>
      </div>
      <div class="flex w-full max-w-[140px] items-center gap-3">
        <div class="relative block h-2 w-full max-w-[100px] rounded-sm bg-gray-200 dark:bg-gray-800">
          <div class="absolute left-0 top-0 flex h-full w-[88%] items-center justify-center rounded-sm bg-brand-500"></div>
        </div>
        <p class="text-theme-sm font-medium text-gray-800 dark:text-white/90">88%</p>
      </div>
    </div>

    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-green-50 dark:bg-green-500/10 text-green-600 dark:text-green-400">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div>
          <p class="text-theme-sm font-semibold text-gray-800 dark:text-white/90">North Ward</p>
          <span class="block text-theme-xs text-gray-500 dark:text-gray-400">2,105 taxpayers</span>
        </div>
      </div>
      <div class="flex w-full max-w-[140px] items-center gap-3">
        <div class="relative block h-2 w-full max-w-[100px] rounded-sm bg-gray-200 dark:bg-gray-800">
          <div class="absolute left-0 top-0 flex h-full w-[72%] items-center justify-center rounded-sm bg-green-500"></div>
        </div>
        <p class="text-theme-sm font-medium text-gray-800 dark:text-white/90">72%</p>
      </div>
    </div>

    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-purple-50 dark:bg-purple-500/10 text-purple-600 dark:text-purple-400">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div>
          <p class="text-theme-sm font-semibold text-gray-800 dark:text-white/90">East Zone</p>
          <span class="block text-theme-xs text-gray-500 dark:text-gray-400">1,874 taxpayers</span>
        </div>
      </div>
      <div class="flex w-full max-w-[140px] items-center gap-3">
        <div class="relative block h-2 w-full max-w-[100px] rounded-sm bg-gray-200 dark:bg-gray-800">
          <div class="absolute left-0 top-0 flex h-full w-[61%] items-center justify-center rounded-sm bg-purple-500"></div>
        </div>
        <p class="text-theme-sm font-medium text-gray-800 dark:text-white/90">61%</p>
      </div>
    </div>

    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-orange-50 dark:bg-orange-500/10 text-orange-600 dark:text-orange-400">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div>
          <p class="text-theme-sm font-semibold text-gray-800 dark:text-white/90">South District</p>
          <span class="block text-theme-xs text-gray-500 dark:text-gray-400">988 taxpayers</span>
        </div>
      </div>
      <div class="flex w-full max-w-[140px] items-center gap-3">
        <div class="relative block h-2 w-full max-w-[100px] rounded-sm bg-gray-200 dark:bg-gray-800">
          <div class="absolute left-0 top-0 flex h-full w-[45%] items-center justify-center rounded-sm bg-orange-500"></div>
        </div>
        <p class="text-theme-sm font-medium text-gray-800 dark:text-white/90">45%</p>
      </div>
    </div>

  </div>
</div>
